{% extends 'vendormis/vmis_base.html' %}
{% block title %}Nations{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Nations</h2>
    <a href="{% url 'vendormis:nation_create' %}" class="btn btn-success">Add Nation</a>
</div>

<div class="card shadow-sm p-3">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for nation in nations %}
            <tr>
                <td>{{ nation.name }}</td>
                <td>
                    <a href="{% url 'vendormis:nation_update' nation.id %}" class="btn btn-sm btn-primary">Edit</a>
                    <a href="{% url 'vendormis:nation_delete' nation.id %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="2" class="text-center">No nations found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
