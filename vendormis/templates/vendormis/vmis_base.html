{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Vendor MIS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 60px; }
        .card { border-radius: 12px; }
        .container { max-width: 1200px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'vendormis:vendor_dashboard' %}">Vendor MIS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                 <li class="nav-item"><a class="nav-link" href="/">Visit website</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'vendormis:nation_list' %}">Nations</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'vendormis:district_list' %}">Districts</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'vendormis:traditionalauthority_list' %}">TAs</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'vendormis:village_list' %}">Villages</a></li>
            
              
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
{% include  "vendormis/includes/footer.html" %}
</html>
