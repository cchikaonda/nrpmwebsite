{% load static wagtailcore_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | New Restoration Plan – Malawi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center">
        <div class="mb-6">
            <svg class="mx-auto h-24 w-24 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h1 class="text-6xl font-extrabold text-gray-900 mb-2">404</h1>
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Page Not Found</h2>
        <p class="text-gray-600 mb-8 leading-relaxed">
            Sorry, we couldn't find the page you were looking for. Perhaps you've taken a wrong turn, or the page has been moved.
        </p>

        <div class="space-y-3">
            <a href="/" class="block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition duration-300">
                Return to Homepage
            </a>
            <a href="javascript:history.back()" class="block w-full text-gray-600 hover:text-green-700 font-medium py-3 rounded-xl transition duration-300">
                Go Back
            </a>
        </div>
    </div>

</body>
</html>
